services:
  db:
    image: postgres:16
    # wal_level=logical is required by Zero (zero-cache) for logical replication.
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the auxiliary databases Zero needs (CVR + change log) on first boot.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d

volumes:
  postgres-data:
